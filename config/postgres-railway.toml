# Railway PostgreSQL service configuration

service_name = "postgres"
dockerfile_path = "infra/docker/images/postgres/Dockerfile"

[build]
builder = "dockerfile"

[deploy]
healthcheck_path = "/"
healthcheck_timeout = 300
restart_policy = "always"

[env]
POSTGRES_DB = "hominem"
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = { from = "POSTGRES_PASSWORD" }
PGDATA = "/var/lib/postgresql"

[networking]
ports = [5432]
