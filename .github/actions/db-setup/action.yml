name: Initialize Database Schema with Goose
description: Apply Goose migrations to a target database

inputs:
  environment:
    description: Target environment (test or prod)
    required: false
    default: test
  migrations-path:
    description: Path to Goose migrations directory (relative to repo root)
    required: false
    default: packages/db/migrations

runs:
  using: composite
  steps:
    - name: Install Goose CLI
      shell: bash
      run: |
        go install github.com/pressly/goose/v3/cmd/goose@v3.27.0
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Ensure database URL available
      shell: bash
      run: |
        if [ -z "$DATABASE_URL" ]; then
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:4433/hominem-test?sslmode=disable" >> $GITHUB_ENV
        fi

    - name: Apply database migrations
      shell: bash
      run: |
        MIGRATIONS_DIR="${GITHUB_WORKSPACE}/${{ inputs.migrations-path }}"
        if [ ! -d "$MIGRATIONS_DIR" ]; then
          echo "Migrations directory not found: $MIGRATIONS_DIR"
          exit 1
        fi
        GOOSE_MIGRATIONS_DIR="$MIGRATIONS_DIR" bash "${GITHUB_WORKSPACE}/scripts/run-goose.sh" up
