name: publish-postgres

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/docker/images/postgres/Dockerfile'
      - 'infra/docker/images/postgres/init-extensions.sh'
      - '.github/workflows/publish-postgres.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push postgresql image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./infra/docker/images/postgres/Dockerfile
          push: true
          tags: ghcr.io/hackefeller/postgres:latest
