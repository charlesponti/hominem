name: Mobile Detox E2E Tests (iOS)

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'services/api/**'
      - '.github/workflows/detox-e2e.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"
      EXPO_PUBLIC_E2E_AUTH_SECRET: "otp-secret"
      AUTH_TEST_OTP_ENABLED: "true"
      AUTH_E2E_SECRET: "otp-secret"
      SEND_EMAILS: "false"
      RESEND_API_KEY: "re_test_key"
      RESEND_FROM_EMAIL: "noreply@hominem.test"
      RESEND_FROM_NAME: "Hominem CI"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hominem_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Start Postgres
        run: docker run -d --name hominem-postgres -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=hominem_test -p 5432:5432 ghcr.io/charlesponti/hominem/pontistudios-postgres:latest

      - name: Start Redis
        run: docker run -d --name hominem-redis -p 6379:6379 redis

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for postgres..."
            sleep 2
          done
          until nc -z localhost 6379; do
            echo "Waiting for redis..."
            sleep 2
          done

      - name: Build required packages
        run: bun run build:types && bun run --filter @hominem/hono-rpc build

      - name: Apply database migrations
        run: bun run db:migrate

      - name: Start API server
        run: bun run --filter @hominem/api dev > /tmp/hominem-api.log 2>&1 &

      - name: Wait for API
        run: |
          until curl -fsS http://localhost:4040/api/health >/dev/null; do
            echo "Waiting for API..."
            sleep 2
          done

      - name: Build iOS app for Detox
        run: bun run --filter @hominem/mobile test:e2e:build:ios

      - name: Run Detox critical auth suite
        run: bun run --filter @hominem/mobile test:e2e:auth:critical
