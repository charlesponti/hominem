name: Mobile Detox E2E Tests (iOS)

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/detox-e2e.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Build iOS app for Detox
        run: bun run --filter @hominem/mobile test:e2e:build:ios

      - name: Run Detox smoke suite
        run: bun run --filter @hominem/mobile test:e2e:smoke
