app = "hominem-web"
primary_region = "sjc"

[build]
  dockerfile = "../apps/web/Dockerfile"

  [build.args]
    VITE_APP_BASE_URL = "https://app.ponti.io"
    VITE_PUBLIC_API_URL = "https://api.ponti.io"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  VITE_APP_BASE_URL = "https://app.ponti.io"
  VITE_PUBLIC_API_URL = "https://api.ponti.io"
  OTEL_SERVICE_NAME = "hominem-web"
  OTEL_DEPLOYMENT_ENVIRONMENT = "production"
  OTEL_TRACES_SAMPLER_ARG = "1.0"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
